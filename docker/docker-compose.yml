services:
  healthcare-db:
    image: postgres:15
    container_name: healthcare-platform-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://healthcare-db:5432/auth_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      healthcare-db:
        condition: service_healthy

  doctor-service:
    build:
      context: ../services/doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://healthcare-db:5432/doctor_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      healthcare-db:
        condition: service_healthy

  appointment-service:
    build:
      context: ../services/appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://healthcare-db:5432/appointment_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      healthcare-db:
        condition: service_healthy

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - PAYHERE_MERCHANT_ID=1232121
      - PAYHERE_MERCHANT_SECRET=MTM2ODU5NDI3NjE0MjUxMzU0NDg1MDk1OTEyNDgzOTcyMzA3ODQw

  patient-service:
    build:
      context: ../services/patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://healthcare-db:5432/patient_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      healthcare-db:
        condition: service_healthy

  ai-symptom-service:
    build:
      context: ../services/ai-symptom-service
      dockerfile: Dockerfile
    container_name: ai-symptom-service
    ports:
      - "8087:8087"

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8088:8088"

  telemedicine-service:
    build:
      context: ../services/telemedicine-service
      dockerfile: Dockerfile
    container_name: telemedicine-service
    ports:
      - "8085:8085"
    environment:
      - JITSI_ROOM_SECRET=ravvycare-secure-secret-2026

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    ports:
      - "5173:80"
    depends_on:
      - auth-service
      - doctor-service
      - appointment-service
      - payment-service
      - patient-service
      - ai-symptom-service
      - notification-service
      - telemedicine-service
