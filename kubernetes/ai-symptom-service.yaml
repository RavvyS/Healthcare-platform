apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: healthcare/ai-symptom-service:latest
          ports:
            - containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - port: 8087
      targetPort: 8087
